name: CI/CD Pipeline - Dialog Support RAG

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Install dev tools
      - name: Install lint & test tools
        run: |
          pip install flake8 pytest

      # 5. Run linting
      - name: Run lint (flake8)
        run: |
          flake8 . || true

      # 6. Run tests
      - name: Run tests
        run: |
          pytest